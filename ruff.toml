# Root-level ruff config for pre-commit hooks.
# sdk/python/ has its own stricter config in pyproject.toml.

line-length = 88

[lint]
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "I",  # isort
]
ignore = [
    "E203",  # whitespace before ':'
    "E501",  # line too long (handled by formatter)
]
