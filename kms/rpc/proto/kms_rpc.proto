syntax = "proto3";

import "google/protobuf/empty.proto";

package kms;

message GetAppKeyRequest {
  uint32 api_version = 1;
  string vm_config = 2;
}

message AppId {
  bytes app_id = 1;
}

message PublicKeyResponse {
  bytes public_key = 1;
  // Legacy signature without timestamp (for backward compatibility).
  // Signs: Keccak256("dstack-env-encrypt-pubkey" + ":" + app_id + public_key)
  bytes signature = 2;
  // Unix timestamp in seconds when the response was generated.
  uint64 timestamp = 3;
  // New signature with timestamp to prevent replay attacks.
  // Signs: Keccak256("dstack-env-encrypt-pubkey" + ":" + app_id + timestamp_be_bytes + public_key)
  bytes signature_v1 = 4;
}

message AppKeyResponse {
  // TLS CA certificate which is used as the trust anchor for all HTTPS RPCs in the system.
  string ca_cert = 1;
  // Disk encryption key used as the key phrase for the App's full disk encryption.
  bytes disk_crypt_key = 2;
  // X25519 key for decrypting secret environment variables.
  bytes env_crypt_key = 3;
  // ECDSA key for app's Ethereum-compatible signing operations.
  bytes k256_key = 4;
  // Signature of the k256 key signed by the root k256 key.
  bytes k256_signature = 5;
  // Reverse proxy app ID from DstackKms contract. (Deprecated. For backward compatibility)
  string tproxy_app_id = 6;
  // Reverse proxy app ID from DstackKms contract.
  string gateway_app_id = 7;
  // OS Image hash 
  bytes os_image_hash = 8;
}

// Response for GetAppKeyAmd. Keys are encrypted with the VM's X25519 public key.
// Decrypt using: crypt-tool decrypt -s $SEED -d <hex_encrypted_key> -p <hex(key_provider_pubkey)>
message AppKeyAmdResponse {
  // TLS CA certificate which is used as the trust anchor for all HTTPS RPCs in the system.
  string ca_cert = 1;
  // Disk encryption key encrypted with the VM's X25519 pubkey (AES-128-SIV).
  bytes disk_crypt_key = 2;
  // X25519 env encryption key encrypted with the VM's X25519 pubkey (AES-128-SIV).
  bytes env_crypt_key = 3;
  // ECDSA k256 key encrypted with the VM's X25519 pubkey (AES-128-SIV).
  bytes k256_key = 4;
  // Signature of the k256 key signed by the root k256 key (plaintext).
  bytes k256_signature = 5;
  // Reverse proxy app ID from DstackKms contract. (Deprecated. For backward compatibility)
  string tproxy_app_id = 6;
  // Reverse proxy app ID from DstackKms contract.
  string gateway_app_id = 7;
  // OS Image hash (plaintext).
  bytes os_image_hash = 8;
  // Ephemeral KMS X25519 public key used to encrypt disk_crypt_key, env_crypt_key, and k256_key.
  bytes key_provider_pubkey = 9;
}

message GetMetaResponse {
  string ca_cert = 1;
  bool allow_any_upgrade = 2;
  bytes k256_pubkey = 3;
  BootstrapResponse bootstrap_info = 4;
  bool is_dev = 5;
  optional string gateway_app_id = 6;
  optional string kms_contract_address = 7;
  optional uint64 chain_id = 8;
  optional string app_auth_implementation = 9;
}

message GetKmsKeyRequest {
  string vm_config = 1;
}

message KmsKeys {
  string ca_key = 1;
  bytes k256_key = 2;
}

message KmsKeyResponse {
  string temp_ca_key = 1;
  repeated KmsKeys keys = 2;
}

message GetTempCaCertResponse {
  string temp_ca_cert = 1;
  string temp_ca_key = 2;
  string ca_cert = 3;
}

message SignCertRequest {
  uint32 api_version = 1;
  bytes csr = 2;
  bytes signature = 3;
  string vm_config = 4;
}

message SignCertResponse {
  repeated string certificate_chain = 1;
}

// The kms public RPC service.
service KMS {
  // Request the app key given the app id and tdx quote
  rpc GetAppKey(GetAppKeyRequest) returns (AppKeyResponse);
  // Request the app key using AMD SEV-SNP attestation
  rpc GetAppKeyAmd(GetAppKeyAmdRequest) returns (AppKeyAmdResponse);
  // KMS key handover
  rpc GetKmsKey(GetKmsKeyRequest) returns (KmsKeyResponse);
  // Request the app environment encryption public key given the app id
  rpc GetAppEnvEncryptPubKey(AppId) returns (PublicKeyResponse);
  // Request the KMS instance metadata for use as a probe and health check.
  rpc GetMeta(google.protobuf.Empty) returns (GetMetaResponse);
  // Request the temporary CA certificate and key
  rpc GetTempCaCert(google.protobuf.Empty) returns (GetTempCaCertResponse);
  // Sign a certificate
  rpc SignCert(SignCertRequest) returns (SignCertResponse);
  // Clear the image cache
  rpc ClearImageCache(ClearImageCacheRequest) returns (google.protobuf.Empty);
}

message ClearImageCacheRequest {
  string token = 1;
  string image_hash = 2;
  string config_hash = 3;
}

// One OVMF SEV metadata section descriptor.
// Extracted from the OVMF binary by extract_ovmf_info.py before VM launch
// and sent inside the VM so the KMS does not need the OVMF file.
// section_type values: 1=SNP_SEC_MEMORY, 2=SNP_SECRETS, 3=CPUID,
//                      4=SVSM_CAA, 0x10=SNP_KERNEL_HASHES.
message OvmfSection {
  uint32 gpa          = 1;
  uint32 size         = 2;
  uint32 section_type = 3;
}

// Request message for AMD SEV-SNP attestation-based app key retrieval.
message GetAppKeyAmdRequest {
  // Raw 1184-byte SNP attestation report binary.
  bytes snp_report = 1;
  // ASK (AMD SEV Key) certificate in PEM format.
  bytes ask_pem = 2;
  // VCEK (Versioned Chip Endorsement Key) certificate in PEM format.
  bytes vcek_pem = 3;

  // Application identifier (hex-encoded, e.g. 20-byte Ethereum address).
  // Determines which derived keys are returned.
  string app_id = 4;

  // SHA-256 of docker-compose.yaml as a hex string (64 chars).
  // This is embedded in the kernel cmdline, so it is covered by MEASUREMENT.
  string compose_hash = 5;

  // SHA-256 of the rootfs ISO image as a hex string (64 chars).
  // Also embedded in the kernel cmdline and covered by MEASUREMENT.
  string rootfs_hash = 6;

  // Image fingerprints — needed by KMS to recompute and verify MEASUREMENT.
  // If these fields are present the KMS MUST verify that
  //   sev-snp-measure(ovmf_hash, kernel_hash, initrd_hash, cmdline, vcpus, vcpu_type)
  //   == report.MEASUREMENT.

  // GCTX-based hash of the OVMF binary (hex, 96 chars = 48 bytes).
  // Compute with: sev-snp-measure --mode snp:ovmf-hash --ovmf ovmf.fd
  string ovmf_hash = 7;

  // SHA-256 of the kernel binary (bzImage) as a hex string (64 chars).
  string kernel_hash = 8;

  // SHA-256 of the initrd binary (initramfs.cpio.gz) as a hex string.
  string initrd_hash = 9;

  // Number of vCPUs the VM was launched with (affects VMSA and MEASUREMENT).
  uint32 vcpus = 10;

  // vCPU type string matching sev-snp-measure --vcpu-type (e.g. "EPYC-v4").
  string vcpu_type = 11;

  // Optional: SHA-256 of docker-files.tar (hex) for docker_additional_files_hash cmdline param.
  string docker_files_hash = 12;

  // OVMF-derived metadata, extracted by extract_ovmf_info.py on the launcher
  // host before VM launch and written into the VM's guest_config virtfs mount.
  // When ovmf_sections is non-empty the KMS does NOT need an OVMF file on disk.
  // Any lie about these values causes MEASUREMENT mismatch → request rejected.

  // GPA of the SEV hashes table within the SNP_KERNEL_HASHES page.
  uint64 sev_hashes_table_gpa = 13;
  // AP reset EIP (entry point for all APs, from SEV_ES_RESET_BLOCK).
  uint32 sev_es_reset_eip     = 14;
  // Ordered list of OVMF SEV metadata sections (determines GCTX page sequence).
  repeated OvmfSection ovmf_sections = 15;
}

message BootstrapRequest {
  string domain = 1;
}

message BootstrapResponse {
  bytes ca_pubkey = 1;
  bytes k256_pubkey = 2;
  bytes attestation = 3;
}

message OnboardRequest {
  string source_url = 1;
  string domain = 2;
}

message OnboardResponse {
}

// Attestation info needed for on-chain KMS authorization.
message AttestationInfoResponse {
  // Device ID (SHA256 of platform device identifier)
  bytes device_id = 1;
  // Aggregated measurement of the VM execution environment
  bytes mr_aggregated = 2;
  // OS image hash
  bytes os_image_hash = 3;
  // Attestation mode (e.g. "dstack-tdx", "dstack-gcp-tdx")
  string attestation_mode = 4;
}

// The Onboard RPC service.
service Onboard {
  // Bootstrap a new KMS
  rpc Bootstrap(BootstrapRequest) returns (BootstrapResponse);
  // Onboard from existing KMS
  rpc Onboard(OnboardRequest) returns (OnboardResponse);
  // Get attestation info for on-chain KMS authorization
  rpc GetAttestationInfo(google.protobuf.Empty) returns (AttestationInfoResponse);
  // Finish onboarding
  rpc Finish(google.protobuf.Empty) returns (google.protobuf.Empty);
}
