# release-plz only manages the public SDK crates. Every other workspace
# member is internal and must never be published to crates.io.

[workspace]
release = false
pr_branch_prefix = "release-plz/"
pr_labels = ["release"]
semver_check = true
changelog_update = true

[[package]]
name = "dstack-sdk-types"
release = true

[[package]]
name = "dstack-sdk"
release = true
